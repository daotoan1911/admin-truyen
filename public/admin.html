<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - WebTruyenChu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <span class="logo">⚙️ WebTruyenChu Admin</span>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="showTab('stories', this)">📚 Truyện</button>
                <button class="tab-btn" onclick="showTab('chapters', this)">📄 Chương</button>
                <button class="tab-btn" onclick="showTab('ads', this)">📢 Quảng cáo</button>
                <button class="tab-btn" onclick="showTab('users', this)">👥 Users</button>
            </div>
        </nav>
    </header>

    <div id="toast"></div>

    <!-- TAB TRUYỆN -->
    <div id="tab-stories" class="tab-content">
        <div class="admin-layout">
            <div class="panel">
                <div class="panel-title">✏️ <span id="storyFormTitle">Thêm truyện mới</span></div>
                <form id="storyForm">
                    <input type="hidden" id="storyId">
                    <label>Tên truyện *</label>
                    <input type="text" id="title" placeholder="Nhập tên truyện..." required>
                    <label>Tác giả *</label>
                    <input type="text" id="author" placeholder="Tên tác giả..." required>
                    <label>Thể loại</label>
                    <input type="text" id="genre" placeholder="Tiên Hiệp, Ngôn Tình...">
                    <label>Mô tả</label>
                    <textarea id="description" rows="3" placeholder="Mô tả ngắn..."></textarea>
                    <label>Ảnh bìa (URL)</label>
                    <input type="text" id="cover" placeholder="https://...">
                    <img id="coverPreview" src=""
                        style="display:none;width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-top:4px"
                        onerror="this.style.display='none'">
                    <button type="button" class="btn-secondary" onclick="openUpload('cover')" style="margin-top:-4px">📁
                        Chọn ảnh từ máy</button>
                    <label class="checkbox-label"><input type="checkbox" id="isVIP"> Truyện VIP</label>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="storySubmitBtn">➕ Thêm truyện</button>
                        <button type="button" class="btn-secondary" id="storyCancelBtn" style="display:none"
                            onclick="resetStoryForm()">Huỷ</button>
                    </div>
                </form>
            </div>
            <div class="list-panel">
                <div class="list-header">
                    <span class="list-title">📋 Danh sách truyện</span>
                    <span class="list-count" id="storyCount"></span>
                </div>
                <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..." oninput="searchStories()">
                <ul class="item-list" id="storyList">
                    <li class="empty">Đang tải...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- TAB CHƯƠNG -->
    <div id="tab-chapters" class="tab-content" style="display:none">
        <div class="admin-layout">
            <div class="panel">
                <div class="panel-title">✏️ <span id="chapterFormTitle">Thêm chương mới</span></div>
                <form id="chapterForm">
                    <input type="hidden" id="chapterId">
                    <label>Chọn truyện *</label>
                    <select id="chapterStoryId" required onchange="loadChapterList()">
                        <option value="">-- Chọn truyện --</option>
                    </select>
                    <label>Số chương *</label>
                    <input type="number" id="chapterNumber" placeholder="1, 2, 3..." required>
                    <label>Tiêu đề chương *</label>
                    <input type="text" id="chapterTitle" placeholder="Tiêu đề..." required>
                    <label>Nội dung *</label>
                    <div style="display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                        <label class="btn-secondary"
                            style="cursor:pointer;padding:7px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px">
                            📂 Upload .txt
                            <input type="file" id="txtFileInput" accept=".txt" style="display:none"
                                onchange="handleTxtUpload(this)">
                        </label>
                        <button type="button" class="btn-secondary" id="translateBtn" onclick="translateContent()"
                            style="font-size:13px">
                            🌐 Dịch Trung → Việt
                        </button>
                        <span id="translateStatus" style="font-size:12px;color:#888;align-self:center"></span>
                    </div>
                    <textarea id="chapterContent" rows="10" placeholder="Nội dung chương... (hoặc upload file .txt)"
                        required></textarea>
                    <label class="checkbox-label"><input type="checkbox" id="chapterIsVIP"> Chương VIP</label>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="chapterSubmitBtn">➕ Thêm chương</button>
                        <button type="button" class="btn-secondary" id="chapterCancelBtn" style="display:none"
                            onclick="resetChapterForm()">Huỷ</button>
                    </div>
                </form>
            </div>
            <div class="list-panel">
                <div class="list-header">
                    <span class="list-title">📋 Danh sách chương</span>
                    <span class="list-count" id="chapterCount"></span>
                </div>
                <ul class="item-list" id="chapterList">
                    <li class="empty">Chọn truyện để xem chương.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- TAB QUẢNG CÁO -->
    <div id="tab-ads" class="tab-content" style="display:none">
        <div style="max-width:900px;margin:28px auto;padding:0 20px">
            <div class="panel">
                <div class="panel-title">📢 Quản lý vị trí quảng cáo</div>
                <p style="color:#666;font-size:13px;margin-bottom:20px">Nhập link và ảnh cho từng vị trí. Nhấn 💾 Lưu để
                    cập nhật lên DB.</p>
                <div id="adSlotList" style="display:flex;flex-direction:column;gap:16px">
                    <div class="empty">Đang tải...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB USERS -->
    <div id="tab-users" class="tab-content" style="display:none">
        <div style="max-width:1000px;margin:28px auto;padding:0 20px">
            <div class="list-panel">
                <div class="list-header">
                    <span class="list-title">👥 Danh sách người dùng</span>
                    <span class="list-count" id="userCount"></span>
                </div>
                <input type="text" id="userSearch" placeholder="🔍 Tìm theo tên hoặc email..." oninput="searchUsers()"
                    style="width:100%;padding:9px 14px;background:#0f0f1a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:14px;outline:none;margin-bottom:14px">
                <ul class="item-list" id="userList">
                    <li class="empty">Đang tải...</li>
                </ul>
            </div>

            <!-- User detail modal -->
            <div id="userDetail" style="display:none;margin-top:20px">
                <div class="panel">
                    <div class="panel-title">👤 <span id="detailName"></span>
                        <button onclick="document.getElementById('userDetail').style.display='none'"
                            style="margin-left:auto;background:none;border:none;color:#666;cursor:pointer;font-size:18px">✕</button>
                    </div>
                    <div id="detailBody" style="display:grid;grid-template-columns:1fr 1fr;gap:16px"></div>
                    <div
                        style="margin-top:16px;padding-top:16px;border-top:1px solid #2a2a40;display:flex;gap:10px;flex-wrap:wrap">
                        <button class="btn-edit" onclick="toggleVIP()" id="vipToggleBtn">...</button>
                        <button class="btn-delete" onclick="deleteUser()" id="deleteUserBtn">🗑️ Xoá tài khoản</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script>
        // ===== CẤU HÌNH API URL =====
        // Khi deploy Vercel: đổi thành URL user app của bạn
        const API = window.location.hostname === 'localhost'
            ? 'http://localhost:5000'
            : '';

        // ===== CLOUDINARY CONFIG =====
        const CLOUD_NAME = 'daqly7n2o';
        const UPLOAD_PRESET = 'geyy2hav';

        function openUpload(targetInputId) {
            const widget = cloudinary.createUploadWidget(
                {
                    cloudName: CLOUD_NAME,
                    uploadPreset: UPLOAD_PRESET,
                    sources: ['local', 'url', 'camera'],
                    multiple: false,
                    maxFileSize: 2000000, // 2MB
                    cropping: false,
                    language: 'vi',
                    text: { vi: { or: 'Hoặc', menu: { files: 'Từ máy tính', url: 'Từ URL', camera: 'Camera' } } }
                },
                (error, result) => {
                    if (!error && result.event === 'success') {
                        document.getElementById(targetInputId).value = result.info.secure_url;
                        // Trigger preview nếu là ad slot
                        const slot = targetInputId.replace('img-', '');
                        if (targetInputId.startsWith('img-')) previewImg(slot, result.info.secure_url);
                        // Trigger preview cho cover truyện
                        if (targetInputId === 'cover') {
                            document.getElementById('coverPreview').src = result.info.secure_url;
                            document.getElementById('coverPreview').style.display = 'block';
                        }
                        widget.close();
                    }
                }
            );
            widget.open();
        }

        let allStories = [];

        function toast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = 'show ' + type;
            setTimeout(() => el.className = '', 2500);
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + name).style.display = 'block';
            btn.classList.add('active');
            if (name === 'chapters') populateStorySelect();
            if (name === 'ads') loadAds();
            if (name === 'users') loadUsers();
        }

        // ===== STORIES =====
        async function loadStories() {
            const res = await fetch(`${API}/stories?all=true`);
            allStories = await res.json();
            renderStoryList(allStories);
        }

        function renderStoryList(stories) {
            document.getElementById('storyCount').textContent = stories.length + ' truyện';
            document.getElementById('storyList').innerHTML = stories.length
                ? stories.map(s => `<li>
            <div class="item-info">
              <div class="item-title">${s.title} ${s.isVIP ? '<span class="vip-badge">VIP</span>' : ''}</div>
              <div class="item-sub">${s.author || ''}${s.genre ? ' · ' + s.genre : ''} · ${s.totalChapters || 0} chương</div>
            </div>
            <div class="item-actions">
              <button class="btn-edit" onclick="editStory('${s._id}')">Sửa</button>
              <button class="btn-delete" onclick="deleteStory('${s._id}')">Xoá</button>
            </div>
          </li>`).join('')
                : '<li class="empty">Chưa có truyện nào.</li>';
        }

        function searchStories() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderStoryList(allStories.filter(s => s.title.toLowerCase().includes(q) || (s.author || '').toLowerCase().includes(q)));
        }

        document.getElementById('storyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('storyId').value;
            const data = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                genre: document.getElementById('genre').value,
                description: document.getElementById('description').value,
                cover: document.getElementById('cover').value,
                isVIP: document.getElementById('isVIP').checked
            };
            await fetch(id ? `${API}/stories/${id}` : `${API}/stories`, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            toast(id ? '✅ Đã cập nhật truyện' : '✅ Đã thêm truyện mới', 'success');
            resetStoryForm(); loadStories();
        });

        async function editStory(id) {
            const res = await fetch(`${API}/stories/${id}`);
            const s = await res.json();
            document.getElementById('storyId').value = s._id;
            document.getElementById('title').value = s.title;
            document.getElementById('author').value = s.author || '';
            document.getElementById('genre').value = s.genre || '';
            document.getElementById('description').value = s.description || '';
            document.getElementById('cover').value = s.cover || '';
            document.getElementById('coverPreview').src = s.cover || '';
            document.getElementById('coverPreview').style.display = s.cover ? 'block' : 'none';
            document.getElementById('isVIP').checked = s.isVIP;
            document.getElementById('storyFormTitle').textContent = 'Sửa truyện';
            document.getElementById('storySubmitBtn').textContent = '💾 Cập nhật';
            document.getElementById('storyCancelBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteStory(id) {
            if (!confirm('Xoá truyện này và toàn bộ chương?')) return;
            await fetch(`${API}/stories/${id}`, { method: 'DELETE' });
            toast('🗑️ Đã xoá truyện'); loadStories();
        }

        function resetStoryForm() {
            document.getElementById('storyForm').reset();
            document.getElementById('storyId').value = '';
            document.getElementById('storyFormTitle').textContent = 'Thêm truyện mới';
            document.getElementById('storySubmitBtn').textContent = '➕ Thêm truyện';
            document.getElementById('storyCancelBtn').style.display = 'none';
        }

        // ===== CHAPTERS =====
        async function populateStorySelect() {
            const res = await fetch(`${API}/stories?all=true`);
            const stories = await res.json();
            const sel = document.getElementById('chapterStoryId');
            const current = sel.value;
            sel.innerHTML = '<option value="">-- Chọn truyện --</option>' +
                stories.map(s => `<option value="${s._id}" ${s._id === current ? 'selected' : ''}>${s.title}</option>`).join('');
            if (current) loadChapterList();
        }

        async function loadChapterList() {
            const storyId = document.getElementById('chapterStoryId').value;
            if (!storyId) { document.getElementById('chapterList').innerHTML = '<li class="empty">Chọn truyện để xem chương.</li>'; return; }
            const res = await fetch(`${API}/chapters?storyId=${storyId}`);
            const chapters = await res.json();
            document.getElementById('chapterCount').textContent = chapters.length + ' chương';
            document.getElementById('chapterList').innerHTML = chapters.length
                ? chapters.map(c => `<li>
            <div class="item-info">
              <div class="item-title">Chương ${c.number}: ${c.title} ${c.isVIP ? '<span class="vip-badge">VIP</span>' : ''}</div>
            </div>
            <div class="item-actions">
              <button class="btn-edit" onclick="editChapter('${c._id}')">Sửa</button>
              <button class="btn-delete" onclick="deleteChapter('${c._id}')">Xoá</button>
            </div>
          </li>`).join('')
                : '<li class="empty">Chưa có chương nào.</li>';
        }

        document.getElementById('chapterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('chapterId').value;
            const data = {
                storyId: document.getElementById('chapterStoryId').value,
                number: parseInt(document.getElementById('chapterNumber').value),
                title: document.getElementById('chapterTitle').value,
                content: document.getElementById('chapterContent').value,
                isVIP: document.getElementById('chapterIsVIP').checked
            };
            await fetch(id ? `${API}/chapters/${id}` : `${API}/chapters`, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            toast(id ? '✅ Đã cập nhật chương' : '✅ Đã thêm chương mới', 'success');
            resetChapterForm(); loadChapterList();
        });

        async function editChapter(id) {
            const res = await fetch(`${API}/chapters/${id}`);
            const c = await res.json();
            document.getElementById('chapterId').value = c._id;
            document.getElementById('chapterStoryId').value = c.storyId;
            document.getElementById('chapterNumber').value = c.number;
            document.getElementById('chapterTitle').value = c.title;
            document.getElementById('chapterContent').value = c.content;
            document.getElementById('chapterIsVIP').checked = c.isVIP;
            document.getElementById('chapterFormTitle').textContent = 'Sửa chương';
            document.getElementById('chapterSubmitBtn').textContent = '💾 Cập nhật';
            document.getElementById('chapterCancelBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteChapter(id) {
            if (!confirm('Xoá chương này?')) return;
            await fetch(`${API}/chapters/${id}`, { method: 'DELETE' });
            toast('🗑️ Đã xoá chương'); loadChapterList();
        }

        function resetChapterForm() {
            document.getElementById('chapterForm').reset();
            document.getElementById('chapterId').value = '';
            document.getElementById('chapterFormTitle').textContent = 'Thêm chương mới';
            document.getElementById('chapterSubmitBtn').textContent = '➕ Thêm chương';
            document.getElementById('chapterCancelBtn').style.display = 'none';
        }

        // ===== ADS =====
        const AD_SLOTS = [
            { slot: 'banner_top', label: '📌 Banner đầu trang (index)' },
            { slot: 'banner_bottom', label: '📌 Banner cuối trang (index)' },
            { slot: 'sidebar', label: '📌 Sidebar giữa trang (chapter)' },
            { slot: 'shopee', label: '🛒 Shopee Affiliate (footer)' },
            { slot: 'float_ad', label: '💫 Float Ad (icon góc phải - tất cả trang)' },
            { slot: 'custom_1', label: '🔧 Quảng cáo tuỳ chỉnh 1' },
            { slot: 'custom_2', label: '🔧 Quảng cáo tuỳ chỉnh 2' },
        ];

        async function loadAds() {
            let map = {};
            try {
                const res = await fetch(`${API}/ads/all`);
                if (res.ok) { const ads = await res.json(); ads.forEach(a => { map[a.slot] = a; }); }
            } catch (e) { console.warn(e.message); }
            document.getElementById('adSlotList').innerHTML = AD_SLOTS.map(s => {
                const a = map[s.slot] || {};
                const hasUrl = !!(a.url && a.url.trim());
                const hasImg = !!(a.imageUrl && a.imageUrl.trim());
                const isFloat = s.slot === 'float_ad';
                return `<div class="ad-slot-card ${isFloat ? 'float-slot' : ''}">
          <div class="ad-slot-header">
            <span class="ad-slot-label">${s.label}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:11px;color:${hasUrl ? '#4caf50' : '#555'}">${hasUrl ? '● Có link' : '● Chưa có link'}</span>
              <code class="ad-slot-key">${s.slot}</code>
            </div>
          </div>
          ${isFloat ? `<p style="font-size:12px;color:#888;margin-bottom:4px">Icon nhỏ động góc phải màn hình. Click icon → mở banner popup + link. Nên dùng ảnh vuông.</p>` : ''}
          ${hasUrl ? `<div style="font-size:12px;color:#e94560;word-break:break-all;padding:2px 0 6px">🔗 ${a.url}</div>` : ''}
          ${hasImg ? `<img src="${a.imageUrl}" style="width:100%;max-height:80px;object-fit:cover;border-radius:6px;margin-bottom:4px" onerror="this.style.display='none'">` : ''}
          <label>Link URL</label>
          <input type="text" id="url-${s.slot}" value="${a.url || ''}" placeholder="https://...">
          <label>Ảnh banner (URL${isFloat ? ' — nên dùng ảnh vuông ~200x200' : ''})</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input type="text" id="img-${s.slot}" value="${a.imageUrl || ''}" placeholder="https://..." oninput="previewImg('${s.slot}', this.value)" style="flex:1">
            <button type="button" onclick="openUpload('img-${s.slot}')" style="padding:8px 12px;background:#2a2a40;color:#ccc;border:1px solid #333;border-radius:6px;cursor:pointer;white-space:nowrap;font-size:12px" title="Chọn ảnh từ máy">📁</button>
          </div>
          <div class="ad-slot-footer">
            <label class="checkbox-label">
              <input type="checkbox" id="active-${s.slot}" ${a.isActive !== false ? 'checked' : ''}> Hiển thị
            </label>
            <button class="btn-primary" style="flex:0;padding:8px 20px" onclick="saveAd('${s.slot}','${s.label}')">💾 Lưu</button>
          </div>
        </div>`;
            }).join('');
        }

        function previewImg(slot, url) {
            // Preview ảnh ngay khi nhập URL (debounce nhẹ)
            clearTimeout(window._previewTimer);
            window._previewTimer = setTimeout(() => {
                const card = document.getElementById('img-' + slot)?.closest('.ad-slot-card');
                if (!card) return;
                let preview = card.querySelector('.img-preview');
                if (!url) { if (preview) preview.remove(); return; }
                if (!preview) {
                    preview = document.createElement('img');
                    preview.className = 'img-preview';
                    preview.style.cssText = 'width:100%;max-height:80px;object-fit:cover;border-radius:6px;margin-top:4px';
                    preview.onerror = () => preview.remove();
                    document.getElementById('img-' + slot).after(preview);
                }
                preview.src = url;
            }, 600);
        }

        async function saveAd(slot, label) {
            const data = { slot, label, url: document.getElementById('url-' + slot).value.trim(), imageUrl: document.getElementById('img-' + slot).value.trim(), isActive: document.getElementById('active-' + slot).checked };
            await fetch(`${API}/ads`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            toast('✅ Đã lưu: ' + label, 'success'); loadAds();
        }

        loadStories();

        // ===== USERS =====
        const USER_API = window.location.hostname === 'localhost'
            ? 'http://localhost:5000'
            : window.location.origin;

        let allUsers = [], selectedUserId = null;

        async function loadUsers() {
            try {
                const res = await fetch(`${USER_API}/users/all`);
                if (!res.ok) { document.getElementById('userList').innerHTML = '<li class="empty">Không thể tải danh sách user. Kiểm tra USER_API.</li>'; return; }
                allUsers = await res.json();
                renderUsers(allUsers);
            } catch (e) {
                document.getElementById('userList').innerHTML = `<li class="empty">Lỗi: ${e.message}</li>`;
            }
        }

        function renderUsers(users) {
            document.getElementById('userCount').textContent = users.length + ' người dùng';
            document.getElementById('userList').innerHTML = users.length
                ? users.map(u => `<li onclick="showUserDetail('${u._id}')" style="cursor:pointer">
                    <div class="item-info">
                        <div class="item-title">
                            ${u.username}
                            ${u.isVIP ? '<span class="vip-badge">👑 VIP</span>' : ''}
                            ${!u.isVerified ? '<span style="font-size:10px;color:#666;background:#1e1e30;padding:2px 6px;border-radius:4px">Chưa xác nhận</span>' : ''}
                        </div>
                        <div class="item-sub">${u.email} · Số dư: ${(u.balance || 0).toLocaleString('vi-VN')}đ · ${new Date(u.createdAt).toLocaleDateString('vi-VN')}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="event.stopPropagation();showUserDetail('${u._id}')">Chi tiết</button>
                    </div>
                </li>`).join('')
                : '<li class="empty">Chưa có user nào.</li>';
        }

        function searchUsers() {
            const q = document.getElementById('userSearch').value.toLowerCase();
            renderUsers(allUsers.filter(u => u.username.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
        }

        async function showUserDetail(id) {
            selectedUserId = id;
            const u = allUsers.find(u => u._id === id);
            if (!u) return;
            document.getElementById('userDetail').style.display = 'block';
            document.getElementById('detailName').textContent = u.username;
            const expiry = u.vipExpiry ? new Date(u.vipExpiry).toLocaleDateString('vi-VN') : 'Không có';
            document.getElementById('detailBody').innerHTML = `
                <div style="background:#0f0f1a;border-radius:8px;padding:14px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">Email</div>
                    <div style="color:#e0e0e0">${u.email}</div>
                </div>
                <div style="background:#0f0f1a;border-radius:8px;padding:14px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">Trạng thái</div>
                    <div>${u.isVerified ? '<span style="color:#4caf50">✅ Đã xác nhận</span>' : '<span style="color:#e94560">❌ Chưa xác nhận</span>'}</div>
                </div>
                <div style="background:#0f0f1a;border-radius:8px;padding:14px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">Số dư ví</div>
                    <div style="color:#ffd200;font-weight:700">${(u.balance || 0).toLocaleString('vi-VN')} VNĐ</div>
                </div>
                <div style="background:#0f0f1a;border-radius:8px;padding:14px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">VIP</div>
                    <div>${u.isVIP ? `<span style="color:#ffd200">👑 VIP đến ${expiry}</span>` : '<span style="color:#555">Chưa VIP</span>'}</div>
                </div>
                <div style="background:#0f0f1a;border-radius:8px;padding:14px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">Lịch sử đọc</div>
                    <div style="color:#e0e0e0">${(u.history || []).length} chương</div>
                </div>
                <div style="background:#0f0f1a;border-radius:8px;padding:14px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">Ngày đăng ký</div>
                    <div style="color:#e0e0e0">${new Date(u.createdAt).toLocaleDateString('vi-VN')}</div>
                </div>`;
            document.getElementById('vipToggleBtn').textContent = u.isVIP ? '❌ Thu hồi VIP' : '👑 Cấp VIP';
            document.getElementById('vipToggleBtn').style.background = u.isVIP ? '#3a1e1e' : '#1e3a2f';
            document.getElementById('vipToggleBtn').style.color = u.isVIP ? '#e94560' : '#4caf50';
            document.getElementById('vipToggleBtn').style.borderColor = u.isVIP ? '#e94560' : '#4caf50';
            document.getElementById('userDetail').scrollIntoView({ behavior: 'smooth' });
        }

        async function toggleVIP() {
            if (!selectedUserId) return;
            const u = allUsers.find(u => u._id === selectedUserId);
            const action = u.isVIP ? 'revoke' : 'grant';
            const res = await fetch(`${USER_API}/users/${selectedUserId}/admin-vip`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            });
            if (!res.ok) { toast('❌ ' + await res.text()); return; }
            toast(action === 'grant' ? '👑 Đã cấp VIP' : '❌ Đã thu hồi VIP', 'success');
            await loadUsers();
            showUserDetail(selectedUserId);
        }

        async function deleteUser() {
            if (!selectedUserId) return;
            const u = allUsers.find(u => u._id === selectedUserId);
            if (!confirm(`Xoá tài khoản "${u.username}"? Không thể hoàn tác.`)) return;
            const res = await fetch(`${USER_API}/users/${selectedUserId}`, { method: 'DELETE' });
            if (!res.ok) { toast('❌ ' + await res.text()); return; }
            toast('🗑️ Đã xoá tài khoản');
            document.getElementById('userDetail').style.display = 'none';
            loadUsers();
        }

        // ===== UPLOAD TXT =====
        function handleTxtUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('chapterContent').value = e.target.result;
                document.getElementById('translateStatus').textContent = `✅ Đã load: ${file.name}`;
                input.value = '';
            };
            reader.readAsText(file, 'UTF-8');
        }

        // ===== DỊCH TRUNG → VIỆT (MyMemory API, free) =====
        async function translateContent() {
            const content = document.getElementById('chapterContent').value.trim();
            if (!content) { toast('⚠️ Chưa có nội dung để dịch'); return; }

            const btn = document.getElementById('translateBtn');
            const status = document.getElementById('translateStatus');
            btn.disabled = true;
            btn.textContent = '⏳ Đang dịch...';
            status.textContent = '';

            try {
                const lines = content.split('\n');
                const chunks = [];
                let current = '';

                for (const line of lines) {
                    if ((current + '\n' + line).length > 1000) {
                        if (current) chunks.push(current.trim());
                        current = line;
                    } else {
                        current += (current ? '\n' : '') + line;
                    }
                }
                if (current.trim()) chunks.push(current.trim());

                const translated = [];
                for (let i = 0; i < chunks.length; i++) {
                    status.textContent = `Đang dịch... ${i + 1}/${chunks.length} đoạn`;
                    const res = await fetch(`${API}/translate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: chunks[i] })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    translated.push(data.translated);
                    if (i < chunks.length - 1) await new Promise(r => setTimeout(r, 200));
                }

                document.getElementById('chapterContent').value = translated.join('\n');
                status.textContent = `✅ Dịch xong ${chunks.length} đoạn`;
                toast('✅ Dịch hoàn tất!', 'success');
            } catch (e) {
                status.textContent = '❌ Lỗi: ' + e.message;
                toast('❌ Lỗi khi dịch');
            }

            btn.disabled = false;
            btn.textContent = '🌐 Dịch Trung → Việt';
        }
    </script>
</body>
